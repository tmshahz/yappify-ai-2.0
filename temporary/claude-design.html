document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;transition:transform .2s,box-shadow .2s\">Open Workspace\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n          <a class=\"btng\" href=\"#workflow\" style=\"display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.7);color:#3a3556;font-weight:600;font-size:15.5px;padding:14px 24px;border-radius:13px;border:1px solid rgba(124,92,255,.2);transition:background .2s\">See how it works<\u002Fa>\n        <\u002Fdiv>\n        <!-- living waveform -->\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:3px;height:64px\">\n          <sc-for list=\"{{ waveBars }}\" as=\"bar\" hint-placeholder-count=\"44\">\n            <span style=\"display:block;width:4px;border-radius:6px;background:linear-gradient(180deg,#a98bff,#6c4cf0);transform-origin:center;height:{{ bar.h }}px;opacity:.92;animation:wave {{ bar.dur }} ease-in-out {{ bar.delay }} infinite\"><\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== LIVE WORKFLOW PREVIEW ===== -->\n  <section id=\"workflow\" style=\"position:relative;z-index:10;max-width:1100px;margin:0 auto;padding:clamp(40px,7vw,72px) 22px\">\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:46px\">\n      <div style=\"letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700;color:#9a8fc0;margin-bottom:14px\">See it work<\u002Fdiv>\n      <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:clamp(28px,4.2vw,44px);letter-spacing:-.02em;margin:0 0 12px\">Watch a thought become usable.<\u002Fh2>\n      <p style=\"color:#5d5880;font-size:17px;max-width:520px;margin:0 auto;line-height:1.5\">One example, three moves. Speak or upload, pick a mode, copy the result.<\u00 finite\"><\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px;width:200px;text-align:center\">\n        <div style=\"width:72px;height:72px;border-radius:20px;background:rgba(255,255,255,.8);border:1px solid rgba(124,92,255,.16);display:flex;align-items:center;justify-content:center;color:#7C5CFF;box-shadow:0 12px 30px rgba(96,66,180,.12)\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2l2.4 5 5.6.5-4.2 3.7 1.3 5.5L12 19l-5.1 2.7L8.2 16.2 4 12.5 9.6 12z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div><div style=\"font-weight:700;font-size:15px\">AI provider<\u002Fdiv><div style=\"color:#8a83ab;font-size:13px;margin-top:2px\">Google Gemini processes it<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px\">\n      <div class=\"reveal\" style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:20px;box-shadow:0 12px 34px rgba(96,66,180,.09);padding:26px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#EFE9FF,#F7F2FF);color:#7C5CFF;display:flex;align-items:center;justify-content:center\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"7.5\" cy=\"15.5\" r=\"4.5\"><\u002Fcircle><path d=\"M10.5 12.5L19 4\"><\u002Fpath><path d=\"M16 7l3 3\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:15px;letter-spacing:.02em;text-transform:uppercase;margin:0\">Your key, your control<\u002Fh3><\u002Fdiv>\n        <p style=\"color:#67627f;font-size:14.5px;line-height:1.6;margin:0\">Connect your own Google Gemini API key. No shared backend, no resold AI access. Your key is optionally saved in your browser, not on any server.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:20px;box-shadow:0 12px 34px rgba(96,66,180,.09);padding:26px\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px\"><span style=\"width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#EFE9FF,#F7F2FF);color:#7C5CFF;display:flex;align-items:center;justify-content:center\"><svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z\"><\u002Fpath><\u002Fsvg><\u002Fspan><h3 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:15px;letter-spacing:.02em;text-transform:uppercase;margin:0\">Free because we don't resell AI<\u002Fh3><\u002Fdiv>\n        <p style=\"color:#67627f;font-size:14.5px;line-height:1.6;margin:0\">Since you connect directly to your own account, we don't charge for model usage. Google Gemini offers free-tier API access. Many users can start without any cost.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PRIVACY ===== -->\n  <section style=\"position:relative;z-index:10;max-width:1080px;margin:0 auto;padding:clamp(40px,7vw,72px) 22px\">\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:44px\">\n      <div style=\"letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700;color:#9a8fc0;margin-bottom:14px\">Privacy &amp; trust<\u002Fdiv>\n      <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:clamp(28px,4.2vw,44px);letter-spacing:-.02em;margin:0 0 12px\">Designed around your control.<\u002Fh2>\n      <p style=\"color:#5d5880;font-size:17px;max-width:560px;margin:0 auto;line-height:1.5\">Honest by design. yappify-ai minimizes unnecessary server-side storage, without overclaiming what it can't promise.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\">\n      <div class=\"reveal feat\" style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:20px;box-shadow:0 12px 34px rgba(96,66,180,.09);padding:26px;transition:transform .35s,box-shadow .35s,border-color .35s\">\n        <div style=\"width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#EFE9FF,#F7F2FF);color:#7C5CFF;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"7.5\" cy=\"15.5\" r=\"4.5\"><\u002Fcircle><path d=\"M10.5 12.5L19 4\"><\u002Fpath><path d=\"M16 7l3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:17px;margin:0 0 9px\">Your key, your control<\u002Fh3>\n        <p style=\"color:#67627f;font-size:14.5px;line-height:1.6;margin:0\">Connect your own Gemini API key and manage it directly with your provider. No shared backend, no resold AI access.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal feat\" style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:20px;box-shadow:0 12px 34px rgba(96,66,180,.09);padding:26px;transition:transform .35s,box-shadow .35s,border-color .35s\">\n        <div style=\"width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#EFE9FF,#F7F2FF);color:#7C5CFF;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 9h18\"><\u002Fpath><circle cx=\"6\" cy=\"6.5\" r=\".6\" fill=\"currentColor\"><\u002Fcircle><rect x=\"7\" y=\"12\" width=\"6\" height=\"3\" rx=\"1\"><\u002Frect><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:17px;margin:0 0 9px\">Optional local storage<\u002Fh3>\n        <p style=\"color:#67627f;font-size:14.5px;line-height:1.6;margin:0\">Save your key locally in your browser, or re-enter it each session. There is no required server-side account just to use the app.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"reveal feat\" style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:20px;box-shadow:0 12px 34px rgba(96,66,180,.09);padding:26px;transition:transform .35s,box-shadow .35s,border-color .35s\">\n        <div style=\"width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#EFE9FF,#F7F2FF);color:#7C5CFF;display:flex;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 3v5c0 5-3.4 8.4-8 10-4.6-1.6-8-5-8-10V6z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:17px;margin:0 0 9px\">Honest about the provider<\u002Fh3>\n        <p style=\"color:#67627f;font-size:14.5px;line-height:1.6;margin:0\">Requests are sent to Google Gemini to be processed. Data handling is subject to Google's privacy policy. yappify-ai minimizes unnecessary server-side storage.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FAQ ===== -->\n  <section id=\"faq\" style=\"position:relative;z-index:10;max-width:760px;margin:0 auto;padding:clamp(40px,7vw,72px) 22px\">\n    <div class=\"reveal\" style=\"text-align:center;margin-bottom:40px\">\n      <div style=\"letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700;color:#9a8fc0;margin-bottom:14px\">Questions<\u002Fdiv>\n      <h2 style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:clamp(28px,4.2vw,44px);letter-spacing:-.02em;margin:0\">Frequently asked.<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"reveal\" style=\"display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;border:1px solid rgba(124,92,255,.1);border-radius:16px;box-shadow:0 8px 24px rgba(96,66,180,.07);overflow:hidden\">\n          <button class=\"faqrow\" onclick=\"{{ f.onToggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;background:none;border:none;cursor:pointer;padding:19px 22px;text-align:left;font-family:'Plus Jakarta Sans';font-weight:700;font-size:16px;color:#1B1830;transition:background .2s\">\n            {{ f.q }}\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7C5CFF\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"{{ f.iconStyle }}\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n          <div style=\"{{ f.answerStyle }}\"><p style=\"margin:0;padding:0 22px 20px;color:#67627f;font-size:14.5px;line-height:1.65\">{{ f.a }}<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== FOOTER ===== -->\n  <footer style=\"position:relative;z-index:10;margin-top:30px;border-top:1px solid rgba(124,92,255,.12);background:rgba(247,243,253,.6);backdrop-filter:blur(10px)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:46px 22px 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;align-items:start\">\n      <div style=\"max-width:320px\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\">\n          <img src=\"3feaee72-5acf-40c4-b85c-b5a712455b77\" alt=\"yappify-ai\" style=\"width:38px;height:38px;border-radius:11px;object-fit:cover;box-shadow:0 4px 14px rgba(96,66,180,.22)\">\n          <span style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:19px\">yappify-ai<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:#6a6488;font-size:14px;line-height:1.6;margin:0 0 18px\">A voice-first AI workflow that turns spoken thoughts and files into clean, usable output, powered by your own key.<\u002Fp>\n        <a class=\"btnp\" href=\"#top\" style=\"display:inline-flex;align-items:center;gap:8px;background:{{ accent }};color:#fff;font-weight:600;font-size:14px;padding:11px 18px;border-radius:11px;box-shadow:0 8px 22px rgba(108,76,240,.32);transition:transform .2s,box-shadow .2s\">Open Workspace\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:#9a8fc0;margin-bottom:14px\">Product<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px;color:#5c5878\">\n          <a class=\"linklite\" href=\"#workflow\" style=\"transition:color .2s\">Workflow<\u002Fa>\n          <a class=\"linklite\" href=\"#features\" style=\"transition:color .2s\">Features<\u002Fa>\n          <a class=\"linklite\" href=\"#modes\" style=\"transition:color .2s\">Modes<\u002Fa>\n          <a class=\"linklite\" href=\"#byok\" style=\"transition:color .2s\">Bring your own key<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:#9a8fc0;margin-bottom:14px\">Trust<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px;color:#5c5878\">\n          <a class=\"linklite\" href=\"#faq\" style=\"transition:color .2s\">FAQ<\u002Fa>\n          <a class=\"linklite\" href=\"#byok\" style=\"transition:color .2s\">Privacy &amp; control<\u002Fa>\n          <a class=\"linklite\" href=\"#top\" style=\"transition:color .2s\">About developer<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(124,92,255,.1)\"><div style=\"max-width:1080px;margin:0 auto;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;font-size:12.5px;color:#8a83ab\">\n      <span>yappify-ai processes your audio through your own Gemini API key. Data handling is subject to Google's privacy policy.<\u002Fspan>\n      <span>© 2026 yappify-ai<\u002Fspan>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#7C5CFF&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showFloatingCards&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { mode: 0, faq: 0 };\n\n  componentDidMount() {\n    this._io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); this._io.unobserve(e.target); } });\n    }, { threshold: 0.12 });\n    const scan = () => {\n      const root = this.el || document;\n      root.querySelectorAll('.reveal:not(.in)').forEach((n) => this._io.observe(n));\n    };\n    scan();\n    this._scanTimer = setInterval(scan, 400);\n    setTimeout(() => clearInterval(this._scanTimer), 4000);\n  }\n  componentWillUnmount() { if (this._io) this._io.disconnect(); clearInterval(this._scanTimer); }\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#7C5CFF';\n    const showFloatingCards = this.props.showFloatingCards ?? true;\n\n    // living waveform bars\n    const waveBars = [];\n    const n = 46;\n    for (let i = 0; i < n; i++) {\n      const env = Math.sin((i / (n - 1)) * Math.PI); // tall in the middle\n      const wobble = Math.abs(Math.sin(i * 0.9)) * 0.6 + 0.4;\n      const h = Math.round(8 + env * 46 * wobble + (i % 3) * 3);\n      waveBars.push({ h, dur: (0.85 + (i % 6) * 0.11).toFixed(2) + 's', delay: ((i % 9) * 0.07).toFixed(2) + 's' });\n    }\n\n    // modes\n    const modes = [\n      { label: 'Voice notes', mode: 'Quick Notes', before: '\"um so from standup\\u2014 backend is blocked on auth, design wants the new icons, and we should ping marketing before friday\"', after: '\\u2022 Backend blocked on auth\\n\\u2022 Design needs the new icon set\\n\\u2022 Ping marketing before Friday' },\n      { label: 'Prompt building', mode: 'Prompt Enhancer', before: '\"i have this rough idea for a client pitch about saving them a ton of time, not sure how to say it\"', after: 'Write a concise, persuasive client pitch focused on measurable time savings \\u2014 a strong hook, three clear benefits, and a confident call to action.' },\n      { label: 'Translation', mode: 'Translate', before: '\"can you send the signed contract over by tomorrow morning? thanks\"', after: '\\u00bfPodr\\u00edas enviar el contrato firmado ma\\u00f1ana por la ma\\u00f1ana? Gracias.' },\n      { label: 'File processing', mode: 'Upload Files', before: 'team-sync-recording.m4a \\u00b7 24:18\\n(uploaded audio file)', after: 'Clean transcript + 5 key decisions, grouped by topic and ready to paste.' },\n      { label: 'Speaking prep', mode: 'Speaker Prep', before: '\"i need to talk about our q3 results tomorrow and i don\\u2019t know where to start\"', after: 'Opening line, three talking points with proof, and a confident closer for your Q3 update.' },\n      { label: 'Custom workflows', mode: 'Custom Mode', before: '\"same weekly investor update format, every single time\"', after: 'Your saved format, auto-applied: TL;DR \\u2192 metrics \\u2192 asks, in one pass.' },\n    ];\n    const mi = this.state.mode;\n    const active = modes[mi];\n    const baseTab = 'border:1px solid rgba(124,92,255,.16);border-radius:999px;padding:9px 17px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .25s;font-family:DM Sans,sans-serif;';\n    const modeTabs = modes.map((m, i) => ({\n      label: m.label,\n      onSelect: () => this.setState({ mode: i }),\n      tabStyle: i === mi\n        ? baseTab + 'background:' + accent + ';color:#fff;border-color:' + accent + ';box-shadow:0 8px 20px rgba(108,76,240,.32)'\n        : baseTab + 'background:rgba(255,255,255,.7);color:#5c5878'\n    }));\n\n    // faqs\n    const faqsData = [\n      { q: 'Is yappify-ai really free?', a: \"yappify-ai itself doesn't charge for model usage, because you connect your own Google Gemini API key. Gemini offers a free tier, so many people can start without paying anything. Any usage beyond the free tier is billed by Google, not by us.\" },\n      { q: 'What does BYOK mean?', a: 'BYOK stands for \"Bring Your Own Key.\" Instead of routing everything through our servers, you plug in your own Google Gemini API key and talk to the provider directly. yappify-ai is the workflow layer that sits on top.' },\n      { q: 'Where is my API key stored?', a: \"Your key is optionally saved in your browser's local storage so you don't have to re-enter it, or you can choose to type it in each session. It isn't required to live on our servers.\" },\n      { q: 'Is my data private?', a: \"Requests are sent to Google Gemini to be processed, so data handling follows Google's privacy policy. yappify-ai is built to minimize unnecessary server-side storage \\u2014 but we won't overclaim that data never leaves your device.\" },\
